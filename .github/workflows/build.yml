name: Build VS Code Extension

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: write # allow pushing version bump commits and tags

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # ensure tags are available for standard-version

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Bump version with standard-version (only on push to main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          npx standard-version --no-verify
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push --follow-tags origin main

      - name: Build extension bundle
        run: npm run vscode:prepublish

      - name: Package extension
        run: npx @vscode/vsce package --no-dependencies -o one-keyvault-ui.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: one-keyvault-ui
          path: one-keyvault-ui.vsix
