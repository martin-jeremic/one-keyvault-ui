name: CD - Release & Publish

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

jobs:
  release:
    name: Publish VSIX
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    environment: marketplace
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.13.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          pattern: one-keyvault-ui-v*.vsix
          merge-multiple: true
          run-id: ${{ github.event.workflow_run.id }}
          path: .
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve VSIX path
        id: vsix
        shell: bash
        run: |
          VSIX_PATH=$(find . -maxdepth 1 -type f -name 'one-keyvault-ui-v*.vsix' | head -n 1)
          if [ -z "$VSIX_PATH" ]; then
            echo "No VSIX artifact found from CI run ${{ github.event.workflow_run.id }}" >&2
            exit 1
          fi
          echo "path=$VSIX_PATH" >> "$GITHUB_OUTPUT"

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce publish -p "$VSCE_PAT" --packagePath ${{ steps.vsix.outputs.path }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vsix.outputs.path }}
          path: ${{ steps.vsix.outputs.path }}
