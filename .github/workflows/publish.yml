name: CD - Release & Publish

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write
    environment: marketplace
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.13.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx semantic-release

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          pattern: one-keyvault-ui-*.vsix
          merge-multiple: true
          run-id: ${{ github.event.workflow_run.id }}
          path: .
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve VSIX path
        id: vsix
        run: echo "path=$(ls one-keyvault-ui-*.vsix | head -n 1)" >> $GITHUB_OUTPUT

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce publish -p "$VSCE_PAT" --packagePath ${{ steps.vsix.outputs.path }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vsix.outputs.path }}
          path: ${{ steps.vsix.outputs.path }}
