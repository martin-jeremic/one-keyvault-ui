<td class="secret-name">
    <button class="secret-name-button" data-action="toggleDetails" data-secret-name="{{encodedName}}"
        {{interactionDisabledAttr}}>
        {{escapedName}}
    </button>
</td>
<td>
    <div class="secret-value-cell">
        <span class="secret-value masked" data-secret-name="{{encodedName}}">••••••••</span>
        <button class="toggle-visibility" data-action="toggle" data-secret-name="{{encodedName}}"
            {{interactionDisabledAttr}}>👁</button>
    </div>
</td>
<td>
    <button class="status-badge status-toggle {{enabledClass}}" data-action="toggleEnabled"
        data-secret-name="{{encodedName}}" data-enabled="{{enabledValue}}">
        {{enabledText}}
    </button>
</td>
<td>{{createdDate}}</td>
<td>{{updatedDate}}</td>
<td>
    <div class="actions">
        <button class="button-secondary" data-action="edit" data-secret-name="{{encodedName}}"
            {{interactionDisabledAttr}}>Edit</button>
        <button class="button-danger" data-action="delete" data-secret-name="{{encodedName}}">Delete</button>
    </div>
</td>
