<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="{{csp}}">
    <title>Key Vault Secrets</title>
    <link rel="stylesheet" href="{{styleUri}}">
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Secrets</h1>
            <div class="controls">
                <input type="text" id="searchInput" placeholder="Search secrets...">
                <select id="sortBy">
                    <option value="name">Sort by Name</option>
                    <option value="created">Sort by Created</option>
                    <option value="updated">Sort by Updated</option>
                </select>
                <button id="createBtn" class="button-secondary">New Secret</button>
                <button id="refreshBtn" class="button-secondary">Refresh</button>
            </div>
        </div>

        <div id="messageContainer"></div>

        <div id="loadingContainer" class="loading" style="display: none;">
            Loading secrets...
        </div>

        <div id="emptyContainer" class="empty-state" style="display: none;">
            <p>No secrets found in this Key Vault</p>
        </div>

        <div id="tableContainer" style="display: none;">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th class="sortable" data-sort="name">Name</th>
                            <th>Value</th>
                            <th>Status</th>
                            <th>Updated</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="secretsTable">
                    </tbody>
                </table>
            </div>

            <div class="pagination">
                <button id="prevBtn" class="button-secondary">← Previous</button>
                <span class="info">
                    <span id="pageInfo">Page 1</span>
                    (<span id="totalInfo">0</span> total)
                </span>
                <button id="nextBtn" class="button-secondary">Next →</button>
            </div>
        </div>
    </div>

    <script nonce="{{nonce}}">
        window.__ONE_KEYVAULT_STATE__ = {{ state }};
    </script>
    <script nonce="{{nonce}}" src="{{scriptUri}}"></script>
</body>

</html>
